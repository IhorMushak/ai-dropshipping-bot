services:
  backend:
    build: ./backend
    container_name: ai-dropshipping-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - ALIEXPRESS_API_KEY=${ALIEXPRESS_API_KEY}
      - AMAZON_API_KEY=${AMAZON_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - PAYPAL_CLIENT_ID=${PAYPAL_CLIENT_ID}
      - PAYPAL_CLIENT_SECRET=${PAYPAL_CLIENT_SECRET}
      - PAYPAL_ENVIRONMENT=${PAYPAL_ENVIRONMENT}
      - OLLAMA_HOST=http://ollama:11434
    env_file:
      - .env
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_started
    networks:
      - dropshipping-network
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: ai-dropshipping-postgres
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=dropshipping
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d dropshipping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dropshipping-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: ai-dropshipping-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dropshipping-network
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - dropshipping-network
    restart: unless-stopped

networks:
  dropshipping-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  ollama_data:
