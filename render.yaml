services:
  - type: web
    name: ai-dropshipping-backend
    runtime: image
    repo: https://github.com/IhorMushak/ai-dropshipping-bot
    plan: free
    dockerfilePath: ./Dockerfile.railway
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: ai-dropshipping-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: ai-dropshipping-redis
          type: redis
          property: connectionString
      - key: ALIEXPRESS_API_KEY
        sync: false
      - key: PAYPAL_CLIENT_ID
        sync: false
      - key: PAYPAL_CLIENT_SECRET
        sync: false
      - key: PAYPAL_ENVIRONMENT
        value: sandbox

  - type: redis
    name: ai-dropshipping-redis
    plan: free

  - type: postgres
    name: ai-dropshipping-db
    plan: free
